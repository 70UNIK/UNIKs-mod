[manifest]
version = "0.0.1"
dump_lua = true
priority = 99999

[[patches]]
[patches.regex]
target = '=[SMODS Blindside "lib/utils/utils.lua"]'
pattern = '''(.*)function BLINDSIDE.chipsupdate(.*)'''
match_indent = true
position = 'after'
payload = '''

G.GAME.unik_current_operator = G.GAME.unik_current_operator or 0

'''

[[patches]]
[patches.regex]
target = '=[SMODS Blindside "lib/utils/utils.lua"]'
pattern = '''G.GAME.blind.basechips\*G.GAME.blind.mult'''
match_indent = true
position = 'at'
payload = ''' UNIK.arrowfunction(G.GAME.unik_current_operator,G.GAME.blind.basechips,G.GAME.blind.mult) '''

[[patches]]
[patches.regex]
target = '=[SMODS _ "src/ui.lua"]'
pattern = '''text = \"X\"'''
match_indent = true
position = 'after'
payload = ''', id = "unik_operator_text_7777" '''

# the trench reset
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''
-- TARGET: effects after end of round evaluation
'''
match_indent = true
position = 'after'
payload = '''
if BLINDSIDE then
    for i, card in pairs(G.playing_cards) do
        if card.ability and card.ability.extra and card.ability.extra.e_chips and card.config.center.key == 'm_unik_blindside_epic_trench' then
            card.ability.extra.e_chips = card.ability.extra.e_chips_base
        end
        card.ability.unik_burned_by_hook = nil
    end
end
'''

[[patches]]
[patches.pattern]
target = '=[SMODS Blindside "lib/utils/utils.lua"]'
pattern = '''-- TARGET: card destroyed'''
match_indent = true
position = 'after'
payload = '''

'''


[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''SMODS.calculate_context({hand_discard = true, other_card =  _cards[i], full_hand = _cards, ignore_other_debuff = true}, effects)'''
match_indent = true
position = 'after'
payload = '''
if _cards[i] and _cards[i].ability and _cards[i].ability.unik_burned_by_hook then
    burned = true
    _cards[i].ability.unik_burned_by_hook = nil
end
'''

[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''SMODS.calculate_context({hand_retain = true, other_card =  _retained_cards[i], full_hand = _retained_cards, ignore_other_debuff = true}, effects)'''
match_indent = true
position = 'after'
payload = '''
if _cards[i] and _cards[i].ability and _cards[i].ability.unik_burned_by_hook then
    burned = true
    _cards[i].ability.unik_burned_by_hook = nil
end
'''

[[patches]]
[patches.regex]
target = 'functions/state_events.lua'
pattern = '''SMODS.calculate_context\(\{(.*)end_of_round = true(.*)game_over = game_over(.*)'''
match_indent = true
position = 'after'
payload = '''

G.GAME.last_joker = G.GAME.blind.boss

'''

[[patches]]
[patches.pattern]
target = '=[SMODS Blindside "lib/utils/uishop.lua"]'
pattern = '''local final_free = G.GAME.current_round.free_rerolls > 0'''
match_indent = true
position = 'after'
payload = '''

print("current Free Rerolls: ".. G.GAME.current_round.free_rerolls)
print("overall Free Rerolls: "..  G.GAME.round_resets.free_rerolls)
'''
