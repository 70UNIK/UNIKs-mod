[manifest]
version = "0.0.1"
dump_lua = true
priority = -2

##OH WOW! talismanless emult/echips!
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "elseif eval_type == 'dollars' then"
position = "before"
payload = '''
elseif eval_type == 'x_chips' and not UNIK.has_talisman() and not (SMODS.Mods["Cryptlib"] or {}).can_load  then
    sound = 'unik_xchip'
    amt = amt
    text = 'X' .. number_format(amt)
    colour = G.C.CHIPS
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'xlog_mult' then
    sound = 'multhit2'
    volume = 0.7
    amt = amt
    text = localize{type='variable',key='a_Xlog_mult',vars={math.abs(amt)}}
    colour = G.C.MULT
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'xlog_chips' then
    sound = 'xchips'
    volume = 0.7
    amt = amt
    text = '=' .. number_format(amt) .. ' ' .. localize('k_mult')
    colour = G.C.CHIPS
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'eq_mult' and not next(SMODS.find_mod("Spectrallib")) then
    sound = 'multhit1'
    volume = 0.7
    amt = amt
    text = '=' .. number_format(amt) .. ' ' .. localize('k_mult')
    colour = G.C.UNIK_EQMULT
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'eq_chips' and not next(SMODS.find_mod("Spectrallib")) then
    sound = 'chips1'
    volume = 0.7
    amt = amt
    text = '=' .. number_format(amt) .. ' ' .. localize('k_chips')
    colour =  G.C.UNIK_EQCHIPS
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'e_chips' and not UNIK.has_talisman() and not next(SMODS.find_mod("Cryptlib"))  then
    sound = 'unik_echip'
    amt = amt
    text = '^' .. number_format(amt) .. ' ' .. localize('k_chips')
    colour = G.C.DARK_EDITION
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'e_mult' and not UNIK.has_talisman() and not next(SMODS.find_mod("Cryptlib"))  then
    sound = 'unik_emult'
    amt = amt
    text = '^' .. number_format(amt) .. ' ' .. localize('k_mult')
    colour = G.C.DARK_EDITION
    config.type = 'fade'
    config.scale = 0.7
'''
match_indent = true

[[patches]]
[patches.regex]
target = "functions/common_events.lua"
pattern = '''(.*)amt > 0(.*)or(.*)amt < 0'''
position = "after"
payload = ''' or ((eval_type == 'eq_mult' or eval_type == 'eq_chips') and not next(SMODS.find_mod("Cryptlib"))) '''
match_indent = true